[build]
# Forzar Dockerfile en lugar de Nixpacks/Railpack.
# Dockerfile garantiza libxcb1 + libGL + ffmpeg presentes para cv2/mediapipe.
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# El CMD del Dockerfile maneja gunicorn con --worker-class gevent
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
