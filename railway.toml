[build]
# Forzar Dockerfile en lugar de Nixpacks/Railpack.
# Dockerfile garantiza libxcb1 + libGL + ffmpeg presentes para cv2/mediapipe.
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# El CMD del Dockerfile maneja gunicorn (gthread, no gevent — ver Dockerfile)
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
