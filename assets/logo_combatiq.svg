<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CombatIQ logo">
  <defs>
    <linearGradient id="shield" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172635"/>
      <stop offset="1" stop-color="#0B111A"/>
    </linearGradient>
    <linearGradient id="teal" x1="10" y1="18" x2="54" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#35D7E0"/>
      <stop offset="1" stop-color="#62F0E8"/>
    </linearGradient>
    <linearGradient id="punch" x1="20" y1="16" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4F5F"/>
      <stop offset="1" stop-color="#FF9A3D"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.2  0 0 0 0 0.86  0 0 0 0 0.9  0 0 0 .55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <!-- Combat arena / protective shield -->
  <path d="M32 5L54 17.5V42.5L32 59L10 42.5V17.5L32 5Z" fill="url(#shield)"/>
  <path d="M32 7.8L51.5 19V41.2L32 55.8L12.5 41.2V19L32 7.8Z"
        stroke="url(#teal)" stroke-width="2.6" stroke-linejoin="round"/>
  <path d="M18.5 22.5L32 14.7L45.5 22.5" stroke="#2FB7C4" stroke-width="1.2" opacity=".45"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sensor nodes -->
  <circle cx="18" cy="23" r="2.2" fill="#35D7E0"/>
  <circle cx="46" cy="23" r="2.2" fill="#35D7E0"/>
  <circle cx="32" cy="48" r="2.2" fill="#35D7E0"/>

  <!-- Taekwondo kick arc / motion trace -->
  <path d="M17 40C23 29.5 34 23 47.5 21.5" stroke="url(#punch)" stroke-width="4.2"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M39 19L51 21.3L42.8 30.2" stroke="url(#punch)" stroke-width="4.2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ECG and analytics heartbeat -->
  <path d="M13.5 35.5H22.5L26.8 29L31.4 43L36.4 31.5H50.5"
        stroke="url(#teal)" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Boxing glove / impact core -->
  <path d="M25.8 22.2C27.8 18.8 33.4 18.1 36.7 20.8C39.4 23 39.8 27.1 37.4 29.8L35.1 32.4L28.2 31.8L25.4 28.5C24.1 26.8 24.4 24.3 25.8 22.2Z"
        fill="url(#punch)"/>
  <path d="M27.8 31.8H35.1V36.8C35.1 38.7 33.6 40.2 31.7 40.2H30.6C28.9 40.2 27.5 38.8 27.5 37.1V33.4C27.5 32.8 27.6 32.3 27.8 31.8Z"
        fill="#FF6B4A"/>
  <path d="M29.1 22.1C31.1 20.5 34.2 20.8 36.2 23" stroke="#FFD0BB" stroke-width="1.4"
        stroke-linecap="round" opacity=".75"/>
</svg>
