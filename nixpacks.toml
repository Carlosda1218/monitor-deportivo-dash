# Configuración Nixpacks para CombatIQ en Railway.
# Añade librerías del sistema que requiere opencv-python (instalado como
# dependencia transitiva de ultralytics, que requiere libxcb1 y otras X11).
#
# Sin esto, pose_analyzer.py falla al importar cv2 con:
#   libxcb.so.1: cannot open shared object file: No such file or directory

[phases.setup]
aptPkgs = [
  "libxcb1",
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
  "libgomp1",
  "ffmpeg"
]
